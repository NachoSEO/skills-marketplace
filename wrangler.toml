# Cloudflare Workers configuration for skills-marketplace
# Project: SkillsForge (skillsforge.dev)

name = "skills-marketplace"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

# Main worker entry point (generated by OpenNext)
main = ".open-next/worker.js"

# Assets configuration
assets = { directory = ".open-next/assets", binding = "ASSETS" }

# Keep workers.dev subdomain for testing
workers_dev = true

# Custom domains
routes = [
  { pattern = "skillsforge.dev/*", zone_name = "skillsforge.dev" },
  { pattern = "www.skillsforge.dev/*", zone_name = "skillsforge.dev" }
]
